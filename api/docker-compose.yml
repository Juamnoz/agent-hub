version: "3.9"

services:
  api:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://lisa:lisa@postgres:5432/lisa
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lisa
      POSTGRES_PASSWORD: lisa
      POSTGRES_DB: lisa
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lisa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
